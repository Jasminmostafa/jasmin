    <nav>

    <main>
        <section>
            <h2> Fill Course Information </h2>
            <form>
                <label for="cname">course name:</label>
                <input type="text" required>
                <label for="inst"> Instructor: </label>

                <label for="hours">credit hours:</label>

        </section>
